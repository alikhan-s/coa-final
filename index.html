<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Квиз - Premium Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Мягкий фон для глаз */
        body { 
            background-color: #f4f7f6; 
            color: #333;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-top: 40px; 
            padding-bottom: 60px; 
        }

        /* Ограничиваем ширину для удобного чтения */
        .quiz-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Стили карточек вопросов */
        .question-card { 
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            background-color: #ffffff;
            padding: 10px;
        }
        
        .question-title {
            color: #555;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 500;
            margin-bottom: 25px;
        }

        /* Стили для вариантов ответов */
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option { 
            cursor: pointer; 
            transition: all 0.2s ease-in-out; 
            border: 2px solid #edf2f7;
            border-radius: 12px;
            margin-bottom: 10px;
            padding: 12px 20px;
            background-color: #fff;
            font-size: 1.05rem;
        }

        .option:hover { 
            border-color: #cbd5e1;
            background-color: #f8fafc; 
            transform: translateY(-1px);
        }
        
        /* Цвета ответов (сделал их мягче) */
        .correct-guess { 
            background-color: #ecfdf5 !important; 
            border-color: #10b981 !important;
            color: #065f46; 
            font-weight: 500; 
        }
        
        .wrong-guess { 
            background-color: #fef2f2 !important; 
            border-color: #ef4444 !important;
            color: #991b1b; 
        }
        
        .actual-correct { 
            background-color: #f3f4f6 !important; 
            border-color: #9ca3af !important;
            color: #374151; 
            font-weight: 500;
        }
        
        .disabled { pointer-events: none; }
        
        /* Блок результатов */
        #results-container { 
            display: none; 
            margin-top: 40px; 
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container quiz-wrapper">
    <div class="text-center mb-5">
        <h1 class="fw-bold" style="color: #2c3e50;">Итоговое тестирование</h1>
        <p class="text-muted">Ответьте на все вопросы, чтобы увидеть результат</p>
    </div>
    
    <div id="quiz-container">
        <div class="text-center text-muted my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <p class="mt-3">Загрузка вопросов...</p>
        </div>
    </div>

    <div id="results-container" class="card text-center bg-white overflow-hidden">
        <div class="card-header bg-primary text-white py-3 h5 mb-0 border-0">
            Тест завершен!
        </div>
        <div class="card-body p-5">
            <h4 class="card-title text-muted mb-4">Твой итоговый результат</h4>
            <div class="display-3 fw-bold text-primary mb-3" id="score-text">0 / 0</div>
            <p class="card-text h4 text-muted mb-5" id="percentage-text">0% правильных ответов</p>
            <button class="btn btn-primary btn-lg px-5 rounded-pill" onclick="resetQuiz()">Пройти заново</button>
        </div>
    </div>
</div>

<script>
    let allQuestions = [];
    let correctAnswersCount = 0;
    let questionsAnswered = 0;

    // Загрузка JSON файлов
    async function loadQuizData() {
        try {
            const [midtermRes, endtermRes] = await Promise.all([
                fetch('midterm.json').catch(() => null),
                fetch('endterm.json').catch(() => null)
            ]);

            const midtermData = (midtermRes && midtermRes.ok) ? await midtermRes.json() : {};
            const endtermData = (endtermRes && endtermRes.ok) ? await endtermRes.json() : {};

            allQuestions = [...Object.values(midtermData), ...Object.values(endtermData)];
            renderQuiz();
        } catch (error) {
            document.getElementById('quiz-container').innerHTML = 
                `<div class="alert alert-danger rounded-4">Ошибка загрузки файлов: ${error.message}</div>`;
        }
    }

    // Отрисовка вопросов
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        if (allQuestions.length === 0) {
            container.innerHTML = `<div class="alert alert-warning rounded-4">Вопросы не найдены. Убедитесь, что файлы .json на месте.</div>`;
            return;
        }

        allQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'card question-card';
            
            let optionsHtml = '';
            const possibleKeys = ['a', 'b', 'c', 'd', 'e'];
            
            possibleKeys.forEach(key => {
                if (q[key]) {
                    const upperKey = key.toUpperCase();
                    optionsHtml += `<li class="option" data-question-index="${index}" data-option-key="${upperKey}">
                        <strong>${upperKey})</strong> ${q[key]}
                    </li>`;
                }
            });

            card.innerHTML = `
                <div class="card-body">
                    <div class="question-title">Вопрос ${index + 1} из ${allQuestions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <ul class="options-list" id="options-list-${index}">
                        ${optionsHtml}
                    </ul>
                </div>
            `;
            container.appendChild(card);
        });

        // Навешиваем события клика
        document.querySelectorAll('.option').forEach(item => {
            item.addEventListener('click', handleOptionClick);
        });
    }

    // Обработка клика
    function handleOptionClick(event) {
        // Находим сам элемент .option, даже если кликнули на тег <strong> внутри него
        const selectedOptionElement = event.target.closest('.option');
        if (!selectedOptionElement) return;

        const questionIndex = selectedOptionElement.getAttribute('data-question-index');
        const selectedKey = selectedOptionElement.getAttribute('data-option-key');
        
        const questionData = allQuestions[questionIndex];
        const correctKey = questionData.answer;

        const optionsList = document.getElementById(`options-list-${questionIndex}`);
        optionsList.classList.add('disabled');

        if (selectedKey === correctKey) {
            selectedOptionElement.classList.add('correct-guess');
            correctAnswersCount++;
        } else {
            selectedOptionElement.classList.add('wrong-guess');
            const correctOptionElement = optionsList.querySelector(`[data-option-key="${correctKey}"]`);
            if (correctOptionElement) {
                correctOptionElement.classList.add('actual-correct');
            }
        }

        questionsAnswered++;
        checkQuizCompletion();
    }

    // Завершение квиза
    function checkQuizCompletion() {
        if (questionsAnswered === allQuestions.length) {
            const percentage = Math.round((correctAnswersCount / allQuestions.length) * 100);
            
            document.getElementById('score-text').innerText = `${correctAnswersCount} / ${allQuestions.length}`;
            document.getElementById('percentage-text').innerText = `${percentage}% правильных ответов`;
            
            document.getElementById('results-container').style.display = 'block';
            
            // Плавный скролл к результатам
            setTimeout(() => {
                document.getElementById('results-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }
    }

    // Функция для сброса квиза
    function resetQuiz() {
        correctAnswersCount = 0;
        questionsAnswered = 0;
        document.getElementById('results-container').style.display = 'none';
        
        // Перерисовываем вопросы, чтобы сбросить все стили и блокировки
        renderQuiz();
        
        // Скроллим на самый верх
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Запуск
    window.onload = loadQuizData;

</script>
</body>
</html>
